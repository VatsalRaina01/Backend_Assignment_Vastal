# Optional: Use this if you prefer PostgreSQL over SQLite.
# Run: docker-compose up -d
# Then set DATABASE_URL=postgresql://finance_user:finance_pass@localhost:5432/finance_db in .env

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance_db
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
